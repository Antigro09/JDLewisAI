name: Feature request
description: Suggest a new feature or improvement for ContractorAI
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? Why does it matter?
      placeholder: As a contractor, I want ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you have considered.
    validations:
      required: false
  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      description: Which part of the platform would this feature touch?
      options:
        - Web app
        - Desktop
        - Mobile
        - Takeoff Engine
        - CI/Infra
    validations:
      required: true
