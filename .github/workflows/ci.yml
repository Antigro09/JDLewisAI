name: CI

on:
  push:
    branches: [main, develop, "release/**", "hotfix/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to one branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Dummy values so `next build` succeeds without secrets (the Drizzle
      # pool defers connecting until first query, so no DB is needed).
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/db"
      AUTH_SECRET: "ci-placeholder-secret-ci-placeholder-secret"
      ENCRYPTION_KEY: "Y2ktcGxhY2Vob2xkZXIta2V5LWNpLXBsYWNlaG9sZA=="
      ANTHROPIC_API_KEY: "sk-ant-ci-placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
