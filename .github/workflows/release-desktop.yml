name: Release Desktop

on:
  push:
    tags: ["desktop-v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - run: npm ci
        working-directory: electron
      # Bake the hosted origin + desktop-gate handshake into the build
      # (electron/app-config.json — packaged apps can't read env vars).
      - run: node scripts/write-app-config.mjs
        working-directory: electron
        env:
          DESKTOP_APP_URL: ${{ secrets.DESKTOP_APP_URL }}
          DESKTOP_GATE_SECRET: ${{ secrets.DESKTOP_GATE_SECRET }}
      - run: npm run build -- --publish always
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
