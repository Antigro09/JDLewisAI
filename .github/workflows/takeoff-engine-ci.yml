name: Takeoff Engine CI

on:
  push:
    branches: ["**"]
    paths: ["takeoff-engine/**", ".github/workflows/takeoff-engine-ci.yml"]
  pull_request:
    paths: ["takeoff-engine/**", ".github/workflows/takeoff-engine-ci.yml"]

concurrency:
  group: takeoff-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: takeoff-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m ruff check app tests
      - run: python -m pytest tests/ -q
