<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ContractorAI — Connection Error</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fafafa;
      --panel: #ffffff;
      --border: #e5e5e5;
      --text: #171717;
      --muted: #737373;
      --accent: #ea580c;
      --accent-hover: #c2410c;
      --code-bg: #f5f5f5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --panel: #171717;
        --border: #262626;
        --text: #fafafa;
        --muted: #a3a3a3;
        --code-bg: #262626;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", system-ui, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .mark {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: var(--accent);
      color: #ffffff;
      font-size: 26px;
      font-weight: 700;
      line-height: 56px;
      margin: 0 auto 20px;
      user-select: none;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p.sub { color: var(--muted); font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
    .detail {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 24px;
      word-break: break-word;
      text-align: left;
    }
    .detail span { display: block; }
    button {
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: var(--accent-hover); }
    .hint { margin-top: 16px; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">C</div>
    <h1>Can't reach ContractorAI</h1>
    <p class="sub">The app couldn't connect to the ContractorAI server. Check your internet connection, then try again.</p>
    <div class="detail">
      <span id="err-desc"></span>
      <span id="err-code"></span>
      <span id="err-url"></span>
    </div>
    <button id="retry" type="button">Retry</button>
    <p class="hint">If the problem persists, verify the server address is correct and reachable.</p>
  </main>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var desc = params.get("desc") || "Unknown error";
      var code = params.get("code") || "";
      var url = params.get("url") || "";
      // Always assign via textContent — query values are untrusted.
      document.getElementById("err-desc").textContent = desc;
      document.getElementById("err-code").textContent = code ? "Code: " + code : "";
      document.getElementById("err-url").textContent = url;
      document.getElementById("retry").addEventListener("click", function () {
        var target = new URLSearchParams(location.search).get("url");
        if (target) location.href = target;
      });
    })();
  </script>
</body>
</html>
